name: "Lines of Action"

on:
  issues:
    types: [opened]

# Prevent parallel executions and queue moves to avoid race conditions
concurrency:
  group: loa-game
  cancel-in-progress: false

jobs:
  move:
    runs-on: ubuntu-latest
    if: startsWith(github.event.issue.title, 'loa|')
    steps:
    - name: Set env vars
      run: |
        echo "REPOSITORY=${{ github.repository }}" >> $GITHUB_ENV
        echo "EVENT_ISSUE_NUMBER=${{ github.event.issue.number }}" >> $GITHUB_ENV
        echo "EVENT_USER_LOGIN=${{ github.event.issue.user.login }}" >> $GITHUB_ENV
        echo "ISSUE_TITLE=${{ github.event.issue.title }}" >> $GITHUB_ENV

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: |
        npm install @octokit/rest

    - name: Process move
      id: process_move
      continue-on-error: true
      run: |
        OUTPUT=$(node scripts/process-move.js 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"
        if echo "$OUTPUT" | grep -q "SUCCESS:"; then
          MESSAGE=$(echo "$OUTPUT" | grep "SUCCESS:" | sed 's/SUCCESS: //')
          echo "success=true" >> $GITHUB_OUTPUT
          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo "$MESSAGE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        else
          ERROR=$(echo "$OUTPUT" | grep "ERROR:" | sed 's/ERROR: //' || echo "Could not process move")
          echo "success=false" >> $GITHUB_OUTPUT
          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo "$ERROR" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        fi
        exit $EXIT_CODE

    - name: Add reaction to issue
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          await github.rest.reactions.createForIssue({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            content: 'eyes'
          });

    - name: Comment on issue
      if: always()
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const issueNumber = context.issue.number;
          const userLogin = context.issue.user.login;
          const success = steps.process_move.outputs.success === 'true';
          const message = steps.process_move.outputs.message || 'Could not process move. Please check the move format.';
          
          let commentBody = '';
          if (success) {
            commentBody = `@${userLogin} ${message}`;
            if (message.includes('Game over')) {
              commentBody += '\n\nThat\'s game over! Thank you for playing.';
            }
            commentBody += '\n\nView back at https://github.com/${{ github.repository }}';
          } else {
            commentBody = `@${userLogin} ${message}`;
          }
          
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: issueNumber,
            body: commentBody
          });

    - name: Close issue
      if: always()
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          await github.rest.issues.update({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            state: 'closed'
          });

    - name: Commit and push changes
      if: steps.process_move.outputs.success == 'true'
      run: |
        git config --global user.email "action@github.com"
        git config --global user.name "GitHub Action"
        git add loa_games/*.pgn loa_games/*.txt README.md
        MOVE_STR=$(echo "${{ env.ISSUE_TITLE }}" | cut -d'|' -f3)
        git commit -m "${{ env.EVENT_USER_LOGIN }} move $MOVE_STR" || exit 0
        git push || exit 0
